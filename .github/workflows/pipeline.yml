name: Soroban Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: wasm32-unknown-unknown

    - name: Install bc for calculations
      run: |
        if command -v apt-get >/dev/null 2>&1; then
          sudo apt-get update && sudo apt-get install -y bc
        elif command -v yum >/dev/null 2>&1; then
          sudo yum install -y bc
        elif command -v apk >/dev/null 2>&1; then
          sudo apk add bc
        fi

    - name: Setup Node.js for schema validation
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Validate JSON schemas
      run: |
        echo "🔍 Validating JSON schemas..."
        # Install ajv-cli for JSON schema validation
        npm install -g ajv-cli
        
        # Validate course metadata schema
        if [ -f "docs/course-metadata-standard.json" ]; then
          echo "✅ Course metadata schema found, validating..."
          ajv validate -s docs/course-metadata-standard.json -d docs/course-metadata-standard.json --spec=draft7 || {
            echo "❌ Course metadata schema validation failed"
            exit 1
          }
          echo "✅ Course metadata schema is valid"
        else
          echo "⚠️ Course metadata schema not found"
        fi

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

    - name: Install bc for calculations
      run: |
        if command -v apt-get >/dev/null 2>&1; then
          sudo apt-get update && sudo apt-get install -y bc
        elif command -v yum >/dev/null 2>&1; then
          sudo yum install -y bc
        elif command -v apk >/dev/null 2>&1; then
          sudo apk add bc
        fi

    - name: Build Wasm contract
      run: cargo build --release --target wasm32-unknown-unknown

    - name: Check Wasm size
      run: |
        # Find the built .wasm file
        WASM_FILE=$(find target/wasm32-unknown-unknown/release -name "*.wasm" | head -1)
        
        if [ -z "$WASM_FILE" ]; then
          echo "❌ ERROR: No .wasm file found!"
          exit 1
        fi
        
        # Get file size in bytes
        FILE_SIZE=$(stat -c%s "$WASM_FILE")
        
        # Calculate KB size (handle both bc and awk for compatibility)
        if command -v bc >/dev/null 2>&1; then
          FILE_SIZE_KB=$(echo "scale=2; $FILE_SIZE / 1024" | bc)
        else
          FILE_SIZE_KB=$(awk "BEGIN {printf \"%.2f\", $FILE_SIZE/1024}")
        fi
        
        echo "📁 Wasm file: $WASM_FILE"
        echo "📊 File size: $FILE_SIZE bytes ($FILE_SIZE_KB KB)"
        
        # Soroban limit is 64KB (65536 bytes)
        LIMIT_BYTES=65536
        LIMIT_KB=64
        REMAINING_BYTES=$((LIMIT_BYTES - FILE_SIZE))
        
        # Calculate remaining KB
        if command -v bc >/dev/null 2>&1; then
          REMAINING_KB=$(echo "scale=2; $REMAINING_BYTES / 1024" | bc)
        else
          REMAINING_KB=$(awk "BEGIN {printf \"%.2f\", $REMAINING_BYTES/1024}")
        fi
        
        if [ $FILE_SIZE -gt $LIMIT_BYTES ]; then
          echo "❌ ERROR: Wasm file size ($FILE_SIZE_KB KB) exceeds Soroban limit of $LIMIT_KB KB!"
          echo "   Current size: $FILE_SIZE bytes"
          echo "   Limit: $LIMIT_BYTES bytes"
          echo "   Over by: $(($FILE_SIZE - $LIMIT_BYTES)) bytes"
          exit 1
        else
          echo "✅ SUCCESS: Wasm file size ($FILE_SIZE_KB KB) is within Soroban limit of $LIMIT_KB KB"
          echo "   Remaining capacity: $REMAINING_BYTES bytes ($REMAINING_KB KB)"
        fi
        
        # Add size to GitHub Actions summary
        echo "## 🚀 Wasm Size Benchmark Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| File | \`$WASM_FILE\` | 📁 |" >> $GITHUB_STEP_SUMMARY
        echo "| Size | $FILE_SIZE bytes ($FILE_SIZE_KB KB) | 📊 |" >> $GITHUB_STEP_SUMMARY
        echo "| Soroban Limit | $LIMIT_BYTES bytes ($LIMIT_KB KB) | ⚡ |" >> $GITHUB_STEP_SUMMARY
        echo "| Remaining Capacity | $REMAINING_BYTES bytes ($REMAINING_KB KB) | 💾 |" >> $GITHUB_STEP_SUMMARY
        echo "| Status | ✅ **Within Limit** | 🎉 |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📈 Optimization Tips" >> $GITHUB_STEP_SUMMARY
        echo "- Current utilization: $(awk "BEGIN {printf \"%.1f\", $FILE_SIZE*100/$LIMIT_BYTES}")% of Soroban limit" >> $GITHUB_STEP_SUMMARY
        echo "- Consider using \`cargo contract optimize\` for further size reduction" >> $GITHUB_STEP_SUMMARY
        echo "- Review unused dependencies and imports" >> $GITHUB_STEP_SUMMARY
